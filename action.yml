name: 'depup'
description: 'Create PRs for outdated Maven and npm dependencies'
author: 'Harald Pehl'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  path:
    description: 'Path to the project root'
    required: false
    default: '.'
  version:
    description: 'depup version to install (e.g., 0.3.0). Defaults to latest release.'
    required: false
    default: 'latest'
  stable:
    description: 'Exclude pre-release versions (alpha, beta, RC, milestone)'
    required: false
    default: 'false'
  include:
    description: 'Only include artifacts matching glob patterns (comma-separated, e.g., "org.junit:*,react"). Matches Maven groupId:artifactId or npm package names. Exclude takes precedence over include.'
    required: false
    default: ''
  exclude:
    description: 'Exclude artifacts matching glob patterns (comma-separated, e.g., "*:guava,lodash"). Matches Maven groupId:artifactId or npm package names. Takes precedence over include.'
    required: false
    default: ''
  token:
    description: 'GitHub token for creating PRs and branches'
    required: false
    default: ${{ github.token }}
  base-branch:
    description: 'Branch to create PRs against (defaults to repository default branch)'
    required: false
    default: ''
  labels:
    description: 'Comma-separated PR labels (must already exist in the repo)'
    required: false
    default: 'dependencies'

outputs:
  exit-code:
    description: 'Exit code (0=no outdated deps, 1=outdated deps found)'
    value: ${{ steps.create-prs.outputs.exit-code }}

runs:
  using: 'composite'
  steps:
    - name: Install depup
      shell: bash
      env:
        DEPUP_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        case "$RUNNER_OS" in
          Linux)  TARGET="x86_64-unknown-linux-gnu" ;;
          macOS)
            case "$(uname -m)" in
              arm64) TARGET="aarch64-apple-darwin" ;;
              *)     TARGET="x86_64-apple-darwin" ;;
            esac ;;
          Windows) TARGET="x86_64-pc-windows-msvc" ;;
          *) echo "::error::Unsupported runner OS: $RUNNER_OS"; exit 1 ;;
        esac

        if [ "$DEPUP_VERSION" = "latest" ]; then
          DEPUP_VERSION=$(gh release view --repo hpehl/depup --json tagName -q '.tagName')
        elif [[ ! "$DEPUP_VERSION" =~ ^v ]]; then
          DEPUP_VERSION="v${DEPUP_VERSION}"
        fi

        URL="https://github.com/hpehl/depup/releases/download/${DEPUP_VERSION}/depup-${TARGET}.tar.gz"
        echo "::group::Installing depup ${DEPUP_VERSION} for ${TARGET}"
        curl -fsSL "$URL" | tar xz -C /usr/local/bin
        chmod +x /usr/local/bin/depup
        echo "::endgroup::"
        echo "Installed depup ${DEPUP_VERSION}"

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Setup package managers
      shell: bash
      env:
        DEPUP_PATH: ${{ inputs.path }}
      run: |
        bash "${{ github.action_path }}/action-scripts/setup-pm.sh"

    - name: Create PRs for outdated dependencies
      id: create-prs
      shell: bash
      env:
        DEPUP_PATH: ${{ inputs.path }}
        DEPUP_STABLE: ${{ inputs.stable }}
        DEPUP_INCLUDE: ${{ inputs.include }}
        DEPUP_EXCLUDE: ${{ inputs.exclude }}
        DEPUP_BASE_BRANCH: ${{ inputs.base-branch }}
        DEPUP_LABELS: ${{ inputs.labels }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        bash "${{ github.action_path }}/action-scripts/create-prs.sh"
